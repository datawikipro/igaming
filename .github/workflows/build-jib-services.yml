name: "Build Jib Services (aggregator, bot, portal)"

on:
  push:
    branches: [master, main]
    paths:
      - "igaming-dto/**"
      - "igaming-aggregator/**"
      - "igaming-bot/**"
      - "igaming-portal/**"
      - "pom.xml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        module:
          - igaming-aggregator
          - igaming-bot
          - igaming-portal

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build module with Jib
        run: |
          mvn -pl ${{ matrix.module }} -am clean compile \
            com.google.cloud.tools:jib-maven-plugin:3.4.1:build \
            -Djib.from.image=eclipse-temurin:21-jre-jammy \
            -Djib.to.image=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.module }}:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }} \
            -DskipTests -Dmaven.test.skip=true
